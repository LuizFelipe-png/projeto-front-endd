<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <!-- Define o título da página exibido na aba do navegador. -->
        <title>TODO supply a title</title>
        <!-- Define a codificação de caracteres usada pelo documento. -->
        <meta charset="UTF-8" />
        <!-- Configuração de viewport para responsividade em dispositivos móveis. -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>
    <body style="height: 100vh" class="d-flex justify-content-center align-items-center">
        <div class="card shadow p-3 mb-5 bg-body rounded container-sm" style="max-width: 500px">
            <h4>Acesse sua conta:</h4>
            <div class="card-body">
                <form 
                    class="d-grid gap-3"
                    th:action="@{/logar}" th:object="${credenciais}" method="post">
                    <div class="form-floating mb-3">
                        <input type="email" th:field="*{email}" class="form-control" id="floatingInput" placeholder="name@example.com">
                        <label for="floatingInput">Email</label>
                    </div>
                    <div class="form-floating">
                        <input type="password" th:field="*{senha}" class="form-control" id="floatingPassword" placeholder="Password">
                        <label for="floatingPassword">Senha</label>
                    </div>

                    <div>
                        <button style="width: 100%" type="submit" class="btn btn-success">Logar</button>
                    </div>
                </form>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    </body>
</html>
