<!DOCTYPE html>
<html xmlns: th = "http://www.thymeleaf.org" lang="pt-BR">
    <head>
        <title>Registrar</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    </head>
    <body class="d-flex align-items-center justify-content-center bg-white vh-100">

        <form class="p-4 p-md-5 border rounded-3 bg-white" style="width: 100%; max-width: 420px;">
            
            <h1 class="text-center h3 mb-4 fw-bold text-dark">Criar Conta</h1>

            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="floatingUser" placeholder="Usuário">
                <label for="floatingUser" class="text-muted">Usuário</label>
            </div>
            
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                <label for="floatingInput" class="text-muted">E-mail</label>
            </div>
            
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingPassword" placeholder="Senha">
                <label for="floatingPassword" class="text-muted">Senha</label>
            </div>
            
            <div class="form-check mb-4 text-start d-flex align-items-center">
                <input type="checkbox" class="form-check-input me-2" id="exampleCheck1">
                <label class="form-check-label text-muted small" for="exampleCheck1">
                    Li e concordo com os <a href="#" class="text-dark fw-bold text-decoration-underline">Termos de Uso</a>
                </label>
            </div>
            
            <button type="submit" class="w-100 btn btn-lg btn-dark fw-bold">Registrar</button>
            
            <a th:href="index" class="w-100 btn btn-lg btn-outline-secondary fw-bold">Voltar</a>
        </form>

    </body>
</html>
